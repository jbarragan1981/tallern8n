<div class="reset-container">
  <div class="glass reset-card">
    <div class="brand">
      <div class="logo">U</div>
      <h1>Restablecer Contraseña</h1>
      <p>Ingrese su nueva contraseña de acceso.</p>
    </div>

    @if (errorMessage()) {
      <div class="alert alert-danger">
        {{ errorMessage() }}
      </div>
    }

    @if (successMessage()) {
      <div class="alert alert-success">
        {{ successMessage() }}
      </div>
    }

    @if (token()) {
      <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
        <div class="form-group">
          <label class="form-label" for="password">Nueva Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            class="form-control" 
            placeholder="Mínimo 6 caracteres"
            [(ngModel)]="password"
            required
          />
        </div>

        <button type="submit" class="btn-primary w-full" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner"></span> Actualizando...
          } @else {
            Actualizar Contraseña
          }
        </button>
      </form>
    }

    <div class="links">
      <a routerLink="/login">Ir al Inicio de Sesión</a>
    </div>
  </div>
</div>
